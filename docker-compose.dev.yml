services:
  # PostgreSQL database
  postgres:
    image: postgres:16-alpine
    container_name: excalidraw-postgres-dev
    environment:
      POSTGRES_USER: excalidraw
      POSTGRES_PASSWORD: excalidraw
      POSTGRES_DB: excalidraw
    ports:
      - "5432:5432"
    volumes:
      - postgres-dev-data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - excalidraw-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U excalidraw"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO file storage
  minio:
    image: minio/minio:latest
    container_name: excalidraw-minio-dev
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-dev-data:/data
    restart: unless-stopped
    networks:
      - excalidraw-network
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend service (development mode)
  backend-dev:
    build:
      context: ./excalidraw-be
      dockerfile: Dockerfile.dev
    container_name: excalidraw-backend-dev
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - HOST=0.0.0.0
      - EXCALIDRAW_DATABASE_HOST=postgres
      - EXCALIDRAW_DATABASE_PORT=5432
      - EXCALIDRAW_DATABASE_USER=excalidraw
      - EXCALIDRAW_DATABASE_PASSWORD=excalidraw
      - EXCALIDRAW_DATABASE_DBNAME=excalidraw
      - EXCALIDRAW_DATABASE_SSLMODE=disable
      - EXCALIDRAW_STORAGE_ENDPOINT=minio:9000
      - EXCALIDRAW_STORAGE_ACCESS_KEY=minioadmin
      - EXCALIDRAW_STORAGE_SECRET_KEY=minioadmin
      - EXCALIDRAW_STORAGE_BUCKET=excalidraw-files
      - EXCALIDRAW_STORAGE_REGION=us-east-1
      - EXCALIDRAW_STORAGE_USE_SSL=false
    env_file:
      - ./excalidraw-be/.env
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./excalidraw-be:/app
    restart: unless-stopped
    networks:
      - excalidraw-network

  # Frontend service (development mode)
  frontend-dev:
    build:
      context: ./excalidraw-fe
      dockerfile: Dockerfile.dev
    container_name: excalidraw-frontend-dev
    ports:
      - "5173:5173"
    depends_on:
      - backend-dev
    volumes:
      - ./excalidraw-fe:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8080
    restart: unless-stopped
    networks:
      - excalidraw-network

networks:
  excalidraw-network:
    driver: bridge

volumes:
  postgres-dev-data:
  minio-dev-data:
