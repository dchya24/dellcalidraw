services:
  # PostgreSQL database
  postgres:
    image: postgres:16-alpine
    container_name: excalidraw-postgres-dev
    environment:
      POSTGRES_USER: excalidraw
      POSTGRES_PASSWORD: excalidraw
      POSTGRES_DB: excalidraw
    ports:
      - "5432:5432"
    volumes:
      - postgres-dev-data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - excalidraw-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U excalidraw"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend service (development mode)
  backend-dev:
    build:
      context: ./excalidraw-be
      dockerfile: Dockerfile.dev
    container_name: excalidraw-backend-dev
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - HOST=0.0.0.0
      - EXCALIDRAW_DATABASE_HOST=postgres
      - EXCALIDRAW_DATABASE_PORT=5432
      - EXCALIDRAW_DATABASE_USER=excalidraw
      - EXCALIDRAW_DATABASE_PASSWORD=excalidraw
      - EXCALIDRAW_DATABASE_DBNAME=excalidraw
      - EXCALIDRAW_DATABASE_SSLMODE=disable
    env_file:
      - ./excalidraw-be/.env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./excalidraw-be:/app
    restart: unless-stopped
    networks:
      - excalidraw-network

  # Frontend service (development mode)
  frontend-dev:
    build:
      context: ./excalidraw-fe
      dockerfile: Dockerfile.dev
    container_name: excalidraw-frontend-dev
    ports:
      - "5173:5173"
    depends_on:
      - backend-dev
    volumes:
      - ./excalidraw-fe:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8080
    restart: unless-stopped
    networks:
      - excalidraw-network

networks:
  excalidraw-network:
    driver: bridge

volumes:
  postgres-dev-data:
