server:
  port: "8080"
  read_timeout: 10s
  write_timeout: 10s
  idle_timeout: 60s

websocket:
  read_buffer_size: 1024
  write_buffer_size: 1024
  ping_period: 54s
  pong_wait: 60s

room:
  capacity: 50
  inactivity_timeout: 1h
  cleanup_interval: 10m

database:
  host: "localhost"
  port: 5432
  user: "excalidraw"
  password: "excalidraw"
  dbname: "excalidraw"
  sslmode: "disable"
  max_open_conns: 25
  max_idle_conns: 5
  conn_max_lifetime: 5m

log:
  level: info
  format: json
