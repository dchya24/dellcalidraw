name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # Frontend CI job
  frontend-ci:
    name: Frontend CI
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: excalidraw-fe/package-lock.json

      - name: Install dependencies
        working-directory: ./excalidraw-fe
        run: npm ci

      - name: Lint
        working-directory: ./excalidraw-fe
        run: npm run lint

      - name: Type check
        working-directory: ./excalidraw-fe
        run: npx tsc --noEmit

      - name: Build
        working-directory: ./excalidraw-fe
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: excalidraw-fe/dist
          retention-days: 7

  # Backend CI job
  backend-ci:
    name: Backend CI
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
          cache-dependency-path: excalidraw-be/go.sum

      - name: Install dependencies
        working-directory: ./excalidraw-be
        run: go mod download

      - name: Format check
        working-directory: ./excalidraw-be
        run: |
          go fmt ./...
          if [ -n "$(git diff --name-only)" ]; then
            echo "Code is not formatted. Please run 'go fmt ./...'"
            exit 1
          fi

      - name: Build
        working-directory: ./excalidraw-be
        run: go build -v ./cmd/server

      - name: Test
        working-directory: ./excalidraw-be
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: excalidraw-be/coverage.out
          retention-days: 7

  # Docker build job
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [frontend-ci, backend-ci]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./excalidraw-fe
          push: false
          tags: excalidraw-fe:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./excalidraw-be
          push: false
          tags: excalidraw-be:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
