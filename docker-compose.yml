version: '3.8'

services:
  # Backend service
  backend:
    build:
      context: ./excalidraw-be
      dockerfile: Dockerfile
    container_name: excalidraw-backend
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - HOST=0.0.0.0
    env_file:
      - ./excalidraw-be/.env
    restart: unless-stopped
    networks:
      - excalidraw-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Frontend service
  frontend:
    build:
      context: ./excalidraw-fe
      dockerfile: Dockerfile
    container_name: excalidraw-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - excalidraw-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  excalidraw-network:
    driver: bridge

volumes:
  backend-data:
